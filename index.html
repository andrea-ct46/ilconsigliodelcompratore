<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Consiglio del Compratore</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="icc-header">
  <div class="icc-header-inner">
    <div class="icc-brand">
      <h1 class="icc-wordmark">
        Il Consiglio del <span>Compratore</span>
      </h1>
      <p class="icc-tagline">
        Consigli secchi, niente fuffa.
      </p>
    </div>
    
    <button id="btn-toggle-filters" class="icc-btn accent-icon">Filtra Prodotti <i class="fas fa-filter"></i></button>
  </div>
</header>

<div id="filter-drawer" class="icc-filter-drawer">
  <div class="icc-filter-drawer-header">
    <h2>Filtra e Cerca</h2>
    <button id="btn-close-filters" class="icc-btn-close">×</button>
  </div>
  
  <section class="icc-filters-drawer-body">
    <div class="icc-filters-grid">
      <div class="icc-filter">
        <label for="search">Nome Prodotto</label>
        <input id="search" type="text" placeholder="Es. Smartphone, Cuffie..." />
      </div>

      <div class="icc-filter">
        <label for="filter-category">Categoria</label>
        <select id="filter-category">
          <option value="">Tutte le categorie</option>
        </select>
      </div>

      <div class="icc-filter icc-filter-range">
        <label>Range Prezzo (€)</label>
        <div class="price-inputs">
          <input id="price-min" type="number" min="0" step="0.01" placeholder="Min" />
          <span class="range-separator"></span>
          <input id="price-max" type="number" min="0" step="0.01" placeholder="Max" />
        </div>
      </div>
    </div>
    
    <div class="icc-filter-actions">
      <button id="btn-apply" class="icc-btn primary">Applica Filtri</button>
      <button id="btn-reset" class="icc-btn ghost">Reset</button>
    </div>
  </section>
</div>
<div id="filter-backdrop" class="icc-filter-backdrop"></div>

<main class="icc-main">
  <p id="icc-status" class="icc-status"></p>
  <p id="icc-error" class="icc-error"></p>

  <section id="product-grid" class="icc-grid"></section>
</main>

<footer class="icc-footer">
  <p>© <span id="icc-year"></span> Il Consiglio del Compratore · Link affiliati Amazon</p>
</footer>

  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZ7vqus97NYfJoXjHjjI6705eGKxtqWSUWiHI5vT-xPNNghy3Ie2IaQ2MQDZI53Q7dEYzPVHbeIGR9/pub?output=csv";

    let prodotti = [];

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("icc-year").textContent = new Date().getFullYear();
      caricaProdotti();
      setupFiltri();
    });

    function setupFiltri() {
      const drawer = document.getElementById("filter-drawer");
      const backdrop = document.getElementById("filter-backdrop");
      const btnToggle = document.getElementById("btn-toggle-filters");
      const btnClose = document.getElementById("btn-close-filters");

      // Gestione apertura/chiusura drawer (solo da mobile)
      const isMobile = () => window.innerWidth < 960;
      
      btnToggle.addEventListener("click", () => {
        if(isMobile()){
          drawer.classList.add('open');
          backdrop.classList.add('open');
        } else {
          renderFiltrato();
        }
      });
      
      const closeDrawer = () => {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
      };
      
      btnClose.addEventListener("click", closeDrawer);
      backdrop.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (e) => {
        if(e.key === "Escape" && drawer.classList.contains('open')) closeDrawer();
      });

      document.getElementById("btn-apply").addEventListener("click", () => {
        renderFiltrato();
        if(isMobile()) closeDrawer();
      });
      document.getElementById("btn-reset").addEventListener("click", () => {
        document.getElementById("search").value = "";
        document.getElementById("filter-category").value = "";
        document.getElementById("price-min").value = "";
        document.getElementById("price-max").value = "";
        renderProdotti(prodotti);
        if(isMobile()) closeDrawer();
      });
    }

    async function caricaProdotti() {
      const status = document.getElementById("icc-status");
      const errorBox = document.getElementById("icc-error");
      const grid = document.getElementById("product-grid");

      status.innerHTML = '<span class="loader"></span> Caricamento migliori prodotti...';
      errorBox.textContent = "";
      grid.innerHTML = "";

      try {
        const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
        const res = await fetch(url);

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        const rows = parseCsv(text);
        if (rows.length <= 1) {
          status.textContent = "Nessun prodotto nel foglio.";
          return;
        }

        const headers = rows.shift().map(h => h.trim().toLowerCase());
        const idxTitle = headers.indexOf("titolo");
        const idxDesc = headers.indexOf("descrizione");
        const idxImg = headers.indexOf("immagine");
        const idxLink = headers.indexOf("link");
        const idxCat = headers.indexOf("categoria");
        const idxPrice = headers.indexOf("prezzo");
        const idxFeatured = headers.indexOf("featured"); // NUOVA COLONNA

        if (idxTitle === -1 || idxLink === -1) {
          throw new Error("Intestazioni mancanti. Servono almeno: titolo, link.");
        }

        prodotti = rows.map(cols => {
          const titolo = (cols[idxTitle] || "").trim();
          const descrizione = idxDesc >= 0 ? (cols[idxDesc] || "").trim() : "";
          const immagine = idxImg >= 0 ? (cols[idxImg] || "").trim() : "";
          const link = (cols[idxLink] || "").trim();
          const categoria = idxCat >= 0 ? (cols[idxCat] || "").trim() : "";
          const prezzoRaw = idxPrice >= 0 ? (cols[idxPrice] || "").trim() : "";
          const featured = idxFeatured >= 0 ? (cols[idxFeatured] || "").trim().toLowerCase() === "true" : false; // NUOVO

          let prezzo = parseFloat(prezzoRaw.replace(",", "."));
          if (isNaN(prezzo)) prezzo = null;

          return { titolo, descrizione, immagine, link, categoria, prezzo, featured };
        }).filter(p => p.titolo && p.link);

        popolaCategorie(prodotti);
        renderProdotti(prodotti);
        status.textContent = `${prodotti.length} prodotti trovati`;
      } catch (err) {
        console.error(err);
        status.textContent = "";
        errorBox.textContent = "Errore durante il caricamento del CSV.";
      }
    }

    function popolaCategorie(prodotti) {
      const select = document.getElementById("filter-category");
      const categorie = new Set();
      prodotti.forEach(p => { if (p.categoria) categorie.add(p.categoria); });

      select.querySelectorAll("option:not(:first-child)").forEach(o => o.remove());
      [...categorie].sort().forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function renderFiltrato() {
      const search = document.getElementById("search").value.toLowerCase().trim();
      const cat = document.getElementById("filter-category").value;
      const min = parseFloat(document.getElementById("price-min").value.replace(",", "."));
      const max = parseFloat(document.getElementById("price-max").value.replace(",", "."));

      const filtrati = prodotti.filter(p => {
        if (search && !p.titolo.toLowerCase().includes(search)) return false;
        if (cat && p.categoria !== cat) return false;
        if (!isNaN(min) && p.prezzo !== null && p.prezzo < min) return false;
        if (!isNaN(max) && p.prezzo !== null && p.prezzo > max) return false;
        return true;
      });

      renderProdotti(filtrati);
      const status = document.getElementById("icc-status");
      status.textContent = `Mostrando ${filtrati.length} di ${prodotti.length} prodotti`;
    }

    function renderProdotti(lista) {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";

      // Ordiniamo mettendo i "featured" per primi
      lista.sort((a,b) => (b.featured === a.featured)? 0 : b.featured? 1 : -1);

      lista.forEach(p => {
        const card = document.createElement("article");
        // Aggiungiamo una classe speciale per i prodotti featured
        card.className = `icc-card ${p.featured ? 'icc-card-featured' : ''}`;

        card.innerHTML = `
          ${p.immagine ? `
          <div class="icc-card-thumb">
            ${p.featured ? `<span class="icc-badge featured">TOP 🔥</span>` : (p.categoria ? `<span class="icc-badge">${p.categoria}</span>` : "")}
            <img src="${p.immagine}" alt="${p.titolo}">
          </div>` : ""}
          <div class="icc-card-body">
            <h3 class="icc-card-title">${p.titolo}</h3>
            ${p.descrizione ? `<p class="icc-card-desc">${p.descrizione}</p>` : ""}
            <div class="icc-card-footer">
              ${
                p.prezzo !== null
                  ? `<span class="icc-card-price">${p.prezzo.toFixed(2)} €</span>`
                  : `<span class="icc-card-price icc-card-price--na">Prezzo su Amazon</span>`
              }
              <a href="${p.link}" target="_blank" rel="noopener" class="icc-btn primary small">
                Vedi offerta
              </a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function parseCsv(text) {
      const lines = text.replace(/\r/g, "").split("\n").filter(Boolean);
      return lines.map(line => {
        const cells = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') { current += '"'; i++; } 
            else { inQuotes = !inQuotes; }
          } else if (char === "," && !inQuotes) {
            cells.push(current);
            current = "";
          } else { current += char; }
        }
        cells.push(current);
        return cells;
      });
    }
  </script>
</body>
</html>
