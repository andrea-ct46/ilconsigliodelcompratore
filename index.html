<!DOCTYPE html>
<html lang="it">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Consiglio del Compratore - Store</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="store-header">
  <div class="store-header-top">
    <div class="store-logo">
      <h1>Il Consiglio del <span>Compratore</span></h1>
    </div>
  </div>
  
  <div class="store-search-bar">
    <select id="filter-category" class="search-select">
      <option value="">Tutte le categorie</option>
    </select>
    <input id="search" type="text" class="search-input" placeholder="Cerca prodotto, marca..." />
    <button id="btn-apply-search" class="search-btn">Cerca</button>
  </div>
</header>

<main class="store-main">
  <div class="store-toolbar">
    <div class="toolbar-results" id="icc-status">Caricamento catalogo...</div>
    
    <div class="toolbar-filters">
      <label>Prezzo:</label>
      <input id="price-min" type="number" min="0" step="0.01" placeholder="Min €" class="price-input" />
      <span>-</span>
      <input id="price-max" type="number" min="0" step="0.01" placeholder="Max €" class="price-input" />
      <button id="btn-apply-price" class="btn-filter">Filtra</button>
      <button id="btn-reset" class="btn-reset">Reset</button>
    </div>
  </div>

  <p id="icc-error" class="icc-error"></p>

  <section id="product-grid" class="store-grid"></section>
</main>

<footer class="store-footer">
  <p>© <span id="icc-year"></span> Il Consiglio del Compratore · I prezzi possono variare su Amazon</p>
</footer>

<script>
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTZ7vqus97NYfJoXjHjjI6705eGKxtqWSUWiHI5vT-xPNNghy3Ie2IaQ2MQDZI53Q7dEYzPVHbeIGR9/pub?output=csv";
  let prodotti = [];

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("icc-year").textContent = new Date().getFullYear();
    caricaProdotti();
    setupFiltri();
  });

  function setupFiltri() {
    const applicaFiltri = () => renderFiltrato();
    
    // Attiva la ricerca sia col bottone "Cerca" che "Filtra"
    document.getElementById("btn-apply-search").addEventListener("click", applicaFiltri);
    document.getElementById("btn-apply-price").addEventListener("click", applicaFiltri);
    
    // Ricerca automatica premendo Invio nella barra di ricerca
    document.getElementById("search").addEventListener("keypress", function(e) {
      if (e.key === 'Enter') applicaFiltri();
    });
    
    // Cambiando categoria si aggiorna subito
    document.getElementById("filter-category").addEventListener("change", applicaFiltri);

    document.getElementById("btn-reset").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("filter-category").value = "";
      document.getElementById("price-min").value = "";
      document.getElementById("price-max").value = "";
      renderProdotti(prodotti);
    });
  }

  async function caricaProdotti() {
    const status = document.getElementById("icc-status");
    const errorBox = document.getElementById("icc-error");
    const grid = document.getElementById("product-grid");

    status.textContent = 'Caricamento catalogo...';
    errorBox.textContent = "";
    grid.innerHTML = "";

    try {
      const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      
      const text = await res.text();
      const rows = parseCsv(text);
      if (rows.length <= 1) { status.textContent = "Catalogo vuoto."; return; }

      const headers = rows.shift().map(h => h.trim().toLowerCase());
      const idxTitle = headers.indexOf("titolo");
      const idxDesc = headers.indexOf("descrizione");
      const idxImg = headers.indexOf("immagine");
      const idxLink = headers.indexOf("link");
      const idxCat = headers.indexOf("categoria");
      const idxPrice = headers.indexOf("prezzo");
      const idxFeatured = headers.indexOf("featured");

      if (idxTitle === -1 || idxLink === -1) throw new Error("Intestazioni mancanti. Servono: titolo, link.");

      prodotti = rows.map(cols => {
        const titolo = (cols[idxTitle] || "").trim();
        const descrizione = idxDesc >= 0 ? (cols[idxDesc] || "").trim() : "";
        const immagine = idxImg >= 0 ? (cols[idxImg] || "").trim() : "";
        const link = (cols[idxLink] || "").trim();
        const categoria = idxCat >= 0 ? (cols[idxCat] || "").trim() : "";
        const prezzoRaw = idxPrice >= 0 ? (cols[idxPrice] || "").trim() : "";
        const featured = idxFeatured >= 0 ? (cols[idxFeatured] || "").trim().toLowerCase() === "true" : false;
        
        let prezzo = parseFloat(prezzoRaw.replace(",", "."));
        if (isNaN(prezzo)) prezzo = null;

        return { titolo, descrizione, immagine, link, categoria, prezzo, featured };
      }).filter(p => p.titolo && p.link);

      popolaCategorie(prodotti);
      renderProdotti(prodotti);
    } catch (err) {
      console.error(err);
      status.textContent = "0 prodotti";
      errorBox.textContent = "Errore di connessione al catalogo.";
    }
  }

  function popolaCategorie(prodotti) {
    const select = document.getElementById("filter-category");
    const categorie = new Set();
    prodotti.forEach(p => { if (p.categoria) categorie.add(p.categoria); });

    select.querySelectorAll("option:not(:first-child)").forEach(o => o.remove());
    [...categorie].sort().forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat;
      select.appendChild(opt);
    });
  }

  function renderFiltrato() {
    const search = document.getElementById("search").value.toLowerCase().trim();
    const cat = document.getElementById("filter-category").value;
    const min = parseFloat(document.getElementById("price-min").value.replace(",", "."));
    const max = parseFloat(document.getElementById("price-max").value.replace(",", "."));

    const filtrati = prodotti.filter(p => {
      if (search && !p.titolo.toLowerCase().includes(search)) return false;
      if (cat && p.categoria !== cat) return false;
      if (!isNaN(min) && p.prezzo !== null && p.prezzo < min) return false;
      if (!isNaN(max) && p.prezzo !== null && p.prezzo > max) return false;
      return true;
    });

    renderProdotti(filtrati);
  }

  function renderProdotti(lista) {
    const grid = document.getElementById("product-grid");
    const status = document.getElementById("icc-status");
    grid.innerHTML = "";
    status.textContent = `${lista.length} prodotti trovati`;

    lista.sort((a,b) => (b.featured === a.featured)? 0 : b.featured? 1 : -1);

    lista.forEach(p => {
      const card = document.createElement("article");
      card.className = "store-card";

      card.innerHTML = `
        ${p.immagine ? `
        <div class="store-card-img-wrapper">
          ${p.featured ? `<span class="badge-featured">In Evidenza</span>` : ""}
          <img src="${p.immagine}" alt="${p.titolo}" class="store-card-img">
        </div>` : ""}
        
        <div class="store-card-content">
          <div class="store-card-category">${p.categoria || "Generico"}</div>
          <h3 class="store-card-title" title="${p.titolo}">${p.titolo}</h3>
          
          <div class="store-card-bottom">
            <div class="store-card-price">
              ${p.prezzo !== null ? `€ <span>${p.prezzo.toFixed(2).replace('.', ',')}</span>` : `<span class="no-price">Vedi su sito</span>`}
            </div>
            <a href="${p.link}" target="_blank" rel="noopener" class="store-btn-buy">
              Vedi offerta
            </a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function parseCsv(text) {
    const lines = text.replace(/\r/g, "").split("\n").filter(Boolean);
    return lines.map(line => {
      const cells = [];
      let current = "";
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; } 
          else { inQuotes = !inQuotes; }
        } else if (char === "," && !inQuotes) {
          cells.push(current);
          current = "";
        } else { current += char; }
      }
      cells.push(current);
      return cells;
    });
  }
</script>
</body>
</html>
